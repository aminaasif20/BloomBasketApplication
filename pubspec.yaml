name: bloombasket
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase - Compatible versions
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.0
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.0
  
  # State Management & Routing
  provider: ^6.1.2
  go_router: ^14.0.0
  intl: ^0.19.0
  
  # UI & Utilities
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  smooth_page_indicator: ^1.1.0
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0
  image_picker: ^1.1.2
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/